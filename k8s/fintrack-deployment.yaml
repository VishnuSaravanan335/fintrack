apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintrack-deployment
  labels:
    app: fintrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fintrack
  template:
    metadata:
      labels:
        app: fintrack
    spec:
      containers:
      - name: fintrack-flask
        image: vishnu3335/fintrack-flask-app:latest   # replace with your Docker Hub repo
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: fintrack-service
spec:
  type: NodePort
  selector:
    app: fintrack
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30080
