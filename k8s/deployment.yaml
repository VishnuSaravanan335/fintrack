apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintrack-deployment
  namespace: default
  labels:
    app: fintrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fintrack
  template:
    metadata:
      labels:
        app: fintrack
    spec:
      containers:
      - name: fintrack
        image: your-dockerhub-username/fintrack:latest
        ports:
        - containerPort: 5000
        imagePullPolicy: Always
        env:
        - name: SECRET_KEY
          value: "fintrack-k8s-prod-secret-key-12345"
---
apiVersion: v1
kind: Service
metadata:
  name: fintrack-service
  namespace: default
  labels:
    app: fintrack
spec:
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: fintrack
  type: ClusterIP
